<!DOCTYPE html>
<html lang="ko">
  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body>
    <div class="bg-grid" aria-hidden="true"></div>

      </div>
      <h1 class="name">최민우</h1>

      <ul class="contacts" role="list">

          <div class="contact-row">
            <a class="contact" href="mailto:dnalschl1989@gmail.com">
              <span class="contact__icon" aria-hidden="true">@</span>
              <span class="contact__text">dnalschl1989@gmail.com</span>
            </a>
            <button type="button" class="copy-btn" data-copy="dnalschl1989@gmail.com" aria-label="이메일 주소 복사">

        <li class="contact-block">

            <a class="contact" href="tel:01080803335">
              <span class="contact__icon" aria-hidden="true">☎</span>
              <span class="contact__text">010-8080-3335</span>
            </a>
            <button type="button" class="copy-btn" data-copy="010-8080-3335" aria-label="전화번호 복사">
              복사

          </div>

      <p class="hint" id="copyHint" role="status" aria-live="polite"></p>

    <script src="script.js"></script>
